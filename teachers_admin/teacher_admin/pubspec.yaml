name: teacher_admin
description: "Smart School Teacher App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  intl: ^0.20.2
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0

  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
