<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Homework | The Scholastic Curator</title>

                "secondary-fixed": "#8df5e4",
                "on-primary-container": "#8690ee",
                "surface-variant": "#e2e2e2",
                "outline-variant": "#c6c5d4",
                "inverse-surface": "#2f3131",
                "inverse-primary": "#bdc2ff",
                "surface-bright": "#f9f9f9",
                "secondary": "#006b5f",
                "surface-container-lowest": "#ffffff",
                "primary-fixed": "#e0e0ff",

                "on-primary": "#ffffff",

                "on-secondary-fixed": "#00201c",

                "surface-container": "#eeeeee",
                "on-error-container": "#93000a",

              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-container">
<!-- TopAppBar Execution -->
<header class="fixed top-0 w-full z-50 bg-surface/85 backdrop-blur-md shadow-[0_8px_32px_rgba(26,6,102,0.06)] flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="Professional profile photo of Dr. Julian Curator" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAY2hfcAs7iQXlPhF9qL9vTCekKkZ0n_otzHF0kV6PvO5Z_XWXPiZ6Bf_DwE3Kf05czTlzlFLMgriQi9S2nM6Gvzj0C48eAMh2uFdzUEJ0luixeeIuqcY8lHSc134KsZkJ-VEEGev6c_A_Xu_Bivxn1GZwFVvxrB8jFXvB7-1fMCFkfbFH9AqmVg6aFN9BtN26XVnKWLAa44I-dTlkq5zLMwtJmv8lX1fLP6o8eRpD_CwYYTO4icEcFqlblPOZOqB5XcWkAwiCIN1YC"/>
</div>
<h1 class="font-headline font-bold text-indigo-900 tracking-tight text-xl">Upload Homework</h1>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-indigo-50 transition-colors text-indigo-900">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-3xl mx-auto space-y-10">
<!-- Welcome Section -->
<section class="space-y-2">
<p class="font-label text-on-surface-variant uppercase tracking-widest text-xs font-semibold">New Assignment</p>
<h2 class="font-headline text-3xl font-extrabold text-primary tracking-tight">Curate Learning.</h2>
</section>
<form class="space-y-10">
<!-- Select Class Section -->
<div class="space-y-4">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Select Target Class</label>
<div class="flex flex-wrap gap-2">
<button class="bg-secondary-container text-on-secondary-container px-5 py-2 rounded-xl text-sm font-medium transition-all shadow-sm" type="button">Grade 10-A</button>
<button class="bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high px-5 py-2 rounded-xl text-sm font-medium transition-all" type="button">Grade 10-B</button>
<button class="bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high px-5 py-2 rounded-xl text-sm font-medium transition-all" type="button">Grade 11-C</button>
<button class="bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high px-5 py-2 rounded-xl text-sm font-medium transition-all" type="button">Grade 12-A</button>
</div>
</div>
<!-- Subject & Title Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Subject</label>
<div class="relative group">
<select class="w-full h-14 bg-surface-container-low border-none rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors appearance-none px-4 pt-2 font-medium text-on-surface">
<option>Advanced Mathematics</option>
<option>Quantum Physics</option>
<option>World Literature</option>
<option>Organic Chemistry</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Due Date</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors px-4 pt-2 font-medium text-on-surface" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface-variant pointer-events-none">calendar_today</span>
</div>
</div>
</div>
<!-- Title Field -->
<div class="space-y-2">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Assignment Title</label>
<input class="w-full h-14 bg-surface-container-low border-none rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors px-4 pt-2 font-medium text-on-surface placeholder:text-on-surface-variant/50" placeholder="e.g., Calculus Integration Principles" type="text"/>
</div>
<!-- Description Field -->
<div class="space-y-2">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Detailed Instructions</label>
<textarea class="w-full bg-surface-container-low border-none rounded-t-lg border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors px-4 py-4 font-medium text-on-surface placeholder:text-on-surface-variant/50 resize-none" placeholder="Outline the requirements and learning objectives..." rows="5"></textarea>
</div>
<!-- File Attachment Bento Card -->
<div class="space-y-4">
<label class="font-headline text-sm font-bold text-on-surface ml-1">Resources &amp; Materials</label>
<div class="relative group cursor-pointer">
<div class="w-full border-2 border-dashed border-outline-variant rounded-2xl p-10 flex flex-col items-center justify-center space-y-4 bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<div class="text-center">
<p class="font-headline text-lg font-bold text-on-surface">Upload scholarly documents</p>
<p class="text-sm text-on-surface-variant mt-1">PDF, DOCX, or PPTX up to 25MB</p>
</div>
<button class="mt-2 text-primary font-bold text-sm tracking-wide" type="button">BROWSE FILES</button>
</div>
</div>
</div>
<!-- Priority Toggle -->
<div class="flex items-center justify-between p-6 bg-surface-container-low rounded-2xl">
<div class="flex gap-4 items-center">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="priority_high">priority_high</span>
</div>
<div>
<p class="font-headline font-bold text-on-surface">Mark as Important</p>
<p class="text-xs text-on-surface-variant">Notify students via push and email</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-8 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
</form>
</main>
<!-- Sticky Upload Homework Button -->
<div class="fixed bottom-0 left-0 w-full p-6 glass-panel z-40 flex justify-center">
<button class="w-full max-w-3xl bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-full font-headline font-extrabold text-lg tracking-tight shadow-[0_8px_32px_rgba(26,6,102,0.2)] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="publish">publish</span>
            Upload Homework
        </button>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-indigo-50/50 rounded-full blur-[100px] translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-teal-50/50 rounded-full blur-[80px] -translate-x-1/2 translate-y-1/2"></div>
</body></html>
