<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart School Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "tertiary-container": "#4b2600",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#8df5e4",
                        "on-secondary-fixed-variant": "#005048",
                        "on-secondary-container": "#007165",
                        "on-tertiary-container": "#e17e00",
                        "primary-fixed-dim": "#bdc2ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "surface-tint": "#4c56af",
                        "on-background": "#1a1c1c",
                        "tertiary-fixed": "#ffdcc2",
                        "primary": "#000666",
                        "tertiary-fixed-dim": "#ffb77a",
                        "on-primary-container": "#8690ee",
                        "surface-dim": "#dadada",
                        "on-primary-fixed": "#000767",
                        "background": "#f9f9f9",
                        "surface-bright": "#f9f9f9",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-fixed-variant": "#343d96",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "tertiary": "#2d1400",
                        "inverse-on-surface": "#f0f1f1",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f3f3f3",
                        "secondary": "#006b5f",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#e0e0ff",
                        "inverse-primary": "#bdc2ff",
                        "secondary-fixed-dim": "#70d8c8",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#8df5e4",
                        "outline-variant": "#c6c5d4",
                        "on-secondary-fixed": "#00201c",
                        "on-tertiary-fixed": "#2e1500",
                        "outline": "#767683",
                        "surface": "#f9f9f9",
                        "primary-container": "#1a237e",
                        "on-tertiary-fixed-variant": "#6d3a00",
                        "on-surface-variant": "#454652",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .splash-gradient {
            background: linear-gradient(to bottom, #1A237E 0%, #0D47A1 100%);
        }
        /* Custom progress bar sizing and color per prompt */
        .loading-track {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .loading-indicator {
            background-color: #00897B;
            width: 60%; /* Static representation for the UI design */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body bg-background">
<!-- Mobile Screen Wrapper (390x844px context) -->
<div class="relative w-full h-screen max-w-[390px] mx-auto splash-gradient flex flex-col items-center justify-between overflow-hidden">
<!-- Top Status Bar Placeholder -->
<div class="w-full px-6 pt-4 flex justify-between items-center z-10">
<span class="text-white text-sm font-medium">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-white text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-white text-[18px]">wifi</span>
<span class="material-symbols-outlined text-white text-[18px]">battery_full</span>
</div>
</div>
<!-- Center Branding Content -->
<div class="flex flex-col items-center justify-center flex-grow space-y-8 px-8 text-center">
<!-- Logo Container -->
<div class="w-[120px] h-[120px] bg-white rounded-[28px] shadow-2xl flex items-center justify-center relative group">
<!-- Stacked Icons for "Graduation Cap + Circuit" -->
<div class="relative flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container text-[64px] absolute" data-icon="school">school</span>
<span class="material-symbols-outlined text-secondary opacity-30 text-[48px]" data-icon="memory" style="font-variation-settings: 'FILL' 1;">memory</span>
</div>
<!-- Subtle Level 1 Tint Overlay as per M3 -->
<div class="absolute inset-0 rounded-[28px] bg-primary-container/5 pointer-events-none"></div>
</div>
<!-- App Identity -->
<div class="space-y-2">
<h1 class="font-headline font-extrabold text-[32px] text-white tracking-tight leading-none">
                    Smart School
                </h1>
<p class="font-label font-medium text-[14px] text-white/70 tracking-widest uppercase">
                    Manage. Educate. Excel.
                </p>
</div>
</div>
<!-- Bottom Loading Indicator Area -->
<div class="w-full px-12 pb-16 space-y-6">
<div class="w-full h-[4px] loading-track rounded-full overflow-hidden">
<div class="h-full loading-indicator rounded-full transition-all duration-1000"></div>
</div>
<!-- Contextual Branding / Institution -->
<div class="flex justify-center items-center opacity-40">
<p class="text-[10px] text-white font-label tracking-tighter">POWERED BY SCHOLASTIC CURATOR</p>
</div>
</div>
<!-- Decorative Background Elements (Glass/Subtle Tonal Depth) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
