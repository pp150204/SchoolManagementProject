<!-- Top Section: Safe Area & Branding -->
<header class="pt-[48px] px-6 pb-8 flex flex-col items-start gap-6">
<div class="w-[48px] h-[48px] rounded-xl bg-primary-container flex items-center justify-center overflow-hidden">

                    Welcome to Smart School
                </h1>
<p class="font-body text-on-surface-variant text-sm">
                    Select your role to continue
                </p>
</div>
</header>
<!-- Main Content: Role Selection -->
<main class="flex-1 px-6 flex flex-col gap-4">
<!-- Admin Role Card -->
<button class="w-full h-[80px] bg-surface flex items-center px-4 rounded-xl border border-outline-variant hover:bg-surface-container-low transition-colors duration-200 group text-left">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<div class="ml-4 flex-1">
<h2 class="font-headline font-semibold text-base text-on-surface">Administrator</h2>
<p class="font-body text-xs text-on-surface-variant">Manage school operations</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Teacher Role Card -->
<button class="w-full h-[80px] bg-surface flex items-center px-4 rounded-xl border border-outline-variant hover:bg-surface-container-low transition-colors duration-200 group text-left">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container" data-icon="school">school</span>
</div>
<div class="ml-4 flex-1">
<h2 class="font-headline font-semibold text-base text-on-surface">Teacher</h2>
<p class="font-body text-xs text-on-surface-variant">Manage classes and students</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Parent/Student Role Card -->
<button class="w-full h-[80px] bg-surface flex items-center px-4 rounded-xl border border-outline-variant hover:bg-surface-container-low transition-colors duration-200 group text-left">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container" data-icon="person">person</span>
</div>
<div class="ml-4 flex-1">
<h2 class="font-headline font-semibold text-base text-on-surface">Student / Parent</h2>
<p class="font-body text-xs text-on-surface-variant">View grades and activities</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
