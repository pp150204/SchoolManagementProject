<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart School - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

          extend: {
            colors: {
              "on-error": "#ffffff",
              "tertiary-container": "#4b2600",
              "on-surface": "#1a1c1c",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#8df5e4",
              "on-secondary-fixed-variant": "#005048",

              "on-tertiary-container": "#e17e00",
              "primary-fixed-dim": "#bdc2ff",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2f3131",
              "surface-tint": "#4c56af",
              "on-background": "#1a1c1c",
              "tertiary-fixed": "#ffdcc2",
              "primary": "#000666",
              "tertiary-fixed-dim": "#ffb77a",
              "on-primary-container": "#8690ee",
              "surface-dim": "#dadada",
              "on-primary-fixed": "#000767",
              "background": "#f9f9f9",
              "surface-bright": "#f9f9f9",
              "surface-container-highest": "#e2e2e2",
              "on-primary-fixed-variant": "#343d96",
              "surface-container": "#eeeeee",
              "on-error-container": "#93000a",
              "tertiary": "#2d1400",
              "inverse-on-surface": "#f0f1f1",
              "error-container": "#ffdad6",
              "surface-container-low": "#f3f3f3",
              "secondary": "#006b5f",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#e0e0ff",
              "inverse-primary": "#bdc2ff",
              "secondary-fixed-dim": "#70d8c8",
              "error": "#ba1a1a",
              "secondary-fixed": "#8df5e4",
              "outline-variant": "#c6c5d4",
              "on-secondary-fixed": "#00201c",
              "on-tertiary-fixed": "#2e1500",
              "outline": "#767683",
              "surface": "#f9f9f9",
              "primary-container": "#1a237e",
              "on-tertiary-fixed-variant": "#6d3a00",
              "on-surface-variant": "#454652",
              "surface-variant": "#e2e2e2",
              "surface-container-high": "#e8e8e8"

            fontFamily: {
              "headline": ["Manrope"],

              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<div class="w-[390px] h-[844px] bg-surface relative flex flex-col">
<header class="flex items-center justify-between w-full px-4 py-4 sticky top-0 z-50 bg-surface/85 backdrop-blur-md">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-xl text-on-surface">Login</h1>
<div class="w-12 h-12"></div>
</header>
<main class="flex-1 flex flex-col px-6 pt-8 overflow-y-auto">
<section class="flex flex-col items-start mb-10">
<div class="mb-6 flex items-center justify-center bg-primary-container w-10 h-10 rounded-xl overflow-hidden shadow-sm">
<div class="w-6 h-6 bg-secondary-container rounded-full" data-alt="Abstract minimal school logo graphic"></div>
</div>
<div class="space-y-1">
<h2 class="font-headline font-extrabold text-3xl tracking-tight text-primary-container">Welcome Back!</h2>
<p class="font-body text-on-surface-variant text-base">Sign in to your [Admin/Teacher/Student] account</p>
</div>
<div class="mt-6">
<span class="inline-flex items-center px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container text-sm font-semibold tracking-wide">
                        Admin
                    </span>
</div>
</section>
<section class="space-y-6">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all rounded-t-lg font-body text-on-surface placeholder:text-on-surface-variant/60" placeholder="Email address" type="email"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all rounded-t-lg font-body text-on-surface placeholder:text-on-surface-variant/60" placeholder="Password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">visibility</span>
</button>
</div>
<div class="flex justify-end">
<button class="font-label font-semibold text-primary-container text-sm px-2 py-1 hover:bg-primary-fixed/30 rounded-lg transition-colors">
                        Forgot Password?
                    </button>
</div>
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold rounded-full shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Login
                </button>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink mx-4 text-on-surface-variant text-xs font-bold uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<button class="w-full h-14 bg-white border border-outline-variant text-on-surface font-headline font-bold rounded-full hover:bg-surface-container-low transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Google Sign In
                </button>
</section>
</main>
<footer class="mt-auto p-8 flex flex-col items-center">
<p class="font-body text-sm text-on-surface-variant text-center">
                Don't have an account? <span class="text-primary font-semibold hover:underline cursor-pointer">Contact Admin</span>
</p>
<div class="mt-8 w-32 h-1 bg-on-surface/10 rounded-full"></div>
</footer>
</div>
</body></html>
