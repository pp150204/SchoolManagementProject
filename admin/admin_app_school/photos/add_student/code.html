<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Student - The Scholastic Curator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#bdc2ff",
              "tertiary-container": "#4b2600",
              "tertiary-fixed": "#ffdcc2",
              "outline": "#767683",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "secondary-container": "#8df5e4",
              "surface-container-highest": "#e2e2e2",
              "on-secondary-fixed-variant": "#005048",
              "on-secondary": "#ffffff",
              "surface": "#f9f9f9",
              "secondary-fixed-dim": "#70d8c8",
              "surface-container-low": "#f3f3f3",
              "on-surface-variant": "#454652",
              "secondary-fixed": "#8df5e4",
              "on-primary-container": "#8690ee",
              "surface-variant": "#e2e2e2",
              "outline-variant": "#c6c5d4",
              "inverse-surface": "#2f3131",
              "inverse-primary": "#bdc2ff",
              "surface-bright": "#f9f9f9",
              "secondary": "#006b5f",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#e0e0ff",
              "on-primary-fixed-variant": "#343d96",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f0f1f1",
              "on-surface": "#1a1c1c",
              "surface-tint": "#4c56af",
              "on-tertiary-container": "#e17e00",
              "on-primary-fixed": "#000767",
              "primary": "#000666",
              "on-secondary-fixed": "#00201c",
              "background": "#f9f9f9",
              "surface-container-high": "#e8e8e8",
              "on-background": "#1a1c1c",
              "tertiary-fixed-dim": "#ffb77a",
              "surface-container": "#eeeeee",
              "on-error-container": "#93000a",
              "primary-container": "#1a237e",
              "on-tertiary-fixed": "#2e1500",
              "on-secondary-container": "#007165",
              "tertiary": "#2d1400",
              "surface-dim": "#dadada",
              "on-tertiary-fixed-variant": "#6d3a00",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/85 backdrop-blur-md shadow-[0_8px_32px_rgba(26,6,102,0.06)] flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-indigo-50 rounded-full transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined text-indigo-900" data-icon="close">close</span>
</button>
<h1 class="font-headline font-extrabold text-xl text-indigo-900 tracking-tight">Add New Student</h1>
</div>
<button class="bg-primary text-white px-6 py-2 rounded-full font-semibold hover:opacity-90 active:scale-95 transition-all shadow-md">
            Save
        </button>
</header>
<main class="pt-24 pb-32 max-w-3xl mx-auto px-4">
<!-- Profile Photo Section -->
<section class="mb-10 text-center">
<div class="relative inline-block group">
<div class="w-32 h-32 rounded-3xl bg-surface-container-low overflow-hidden shadow-sm flex items-center justify-center border-2 border-dashed border-outline-variant group-hover:border-primary transition-colors">
<img alt="Profile Placeholder" class="w-full h-full object-cover opacity-20" data-alt="Abstract person silhouette profile placeholder image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDV2hzDnldjbgUSrTSoSujYHI5e3-IuHMwhyoTVumlBmKeJvBKfDpH0u1zbs9xuVE2l0_U1p2ruRIRMovNBAuqC3gvij4R6_ePqTHYin-D4l19fz-G7Hyor5LHoSTB7_nQ-6flV6cahJuZt-Pd1zMhqhs3uVqoaX9dZZqaFIpA_ur0AICyGH8laIuUaL1NkmsIQjjCMOmHZetmrZNHXdClLGOhLEtd7rZ2VZSdHoM0JlLzgzIwCG2-pkfViz6-nvCzVrL-LxjivBAI9"/>
<div class="absolute inset-0 flex items-center justify-center bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-white text-3xl" data-icon="add_a_photo">add_a_photo</span>
</div>
</div>
<div class="mt-4">
<h3 class="font-headline font-bold text-indigo-900">Student Profile Photo</h3>
<p class="text-xs text-on-surface-variant mt-1">PNG or JPG, Max 5MB</p>
</div>
</div>
</section>
<!-- Form Canvas -->
<div class="space-y-12">
<!-- Personal Information -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="person">person</span>
</span>
<h2 class="font-headline font-bold text-lg text-indigo-900">Personal Information</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="md:col-span-2">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Full Name</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="e.g. Alexander Hamilton" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Class</label>
<select class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 appearance-none transition-all">
<option value="">Select Grade</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Section</label>
<select class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 appearance-none transition-all">
<option value="">Select Section</option>
<option>A (Alpha)</option>
<option>B (Beta)</option>
<option>C (Gamma)</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Roll Number</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="Roll #" type="number"/>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Date of Birth</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" type="date"/>
</div>
<div class="md:col-span-2">
<label class="block text-sm font-medium text-on-surface-variant mb-3 ml-1">Gender</label>
<div class="flex w-full bg-surface-container-low p-1 rounded-xl">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm text-primary transition-all">Male</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:bg-white/50 transition-all">Female</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:bg-white/50 transition-all">Other</button>
</div>
</div>
</div>
</section>
<!-- Parent Information -->
<section class="p-6 bg-surface-container-lowest rounded-2xl shadow-[0_8px_32px_rgba(26,6,102,0.04)]">
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-lg bg-teal-50 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="family_restroom">family_restroom</span>
</span>
<h2 class="font-headline font-bold text-lg text-indigo-900">Parent / Guardian Information</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Guardian Name</label>
<input class="w-full bg-surface-container-low border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="Full Name" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Relationship</label>
<input class="w-full bg-surface-container-low border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="e.g. Father, Mother" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Contact Number</label>
<input class="w-full bg-surface-container-low border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="guardian@email.com" type="email"/>
</div>
</div>
</section>
<!-- Address Section -->
<section>
<div class="flex items-center gap-3 mb-6">
<span class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-sm" data-icon="location_on">location_on</span>
</span>
<h2 class="font-headline font-bold text-lg text-indigo-900">Current Address</h2>
</div>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Street Address</label>
<textarea class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all resize-none" placeholder="House no, Street name, Locality..." rows="2"></textarea>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<div class="col-span-1">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">City</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="City" type="text"/>
</div>
<div class="col-span-1">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">State</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="State" type="text"/>
</div>
<div class="col-span-2 md:col-span-1">
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1">Zip Code</label>
<input class="w-full bg-surface-container-high border-none rounded-t-lg border-b-2 border-transparent focus:border-primary focus:ring-0 text-on-surface px-4 py-3 transition-all" placeholder="Zip" type="text"/>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Actions Sticky -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl px-6 py-6 border-t border-outline-variant/10">
<div class="max-w-3xl mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 border border-outline text-on-surface font-semibold rounded-2xl hover:bg-surface-container-low transition-all active:scale-[0.98]">
                Cancel
            </button>
<button class="flex-[2] py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-2xl shadow-lg shadow-primary/20 hover:opacity-95 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
                Enroll Student
            </button>
</div>
</div>
</body></html>
